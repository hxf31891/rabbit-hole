<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Harry's Rabbit Hole</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg-1: #120f1f;
      --bg-2: #1d1630;
      --bg-3: #2a1f45;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.14);
      --text: #f6f1ff;
      --muted: rgba(246, 241, 255, 0.72);
      --accent: #c9a6ff;
      --accent-2: #89e3ff;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(137, 227, 255, 0.12), transparent 25%),
        radial-gradient(circle at 80% 10%, rgba(201, 166, 255, 0.14), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.05), transparent 30%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 0 8%, rgba(0, 0, 0, 0.15) 50%, rgba(0, 0, 0, 0.4) 100%);
      pointer-events: none;
    }

    .stars {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      opacity: 0.6;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 999px;
      background: white;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
      animation: twinkle 3.2s ease-in-out infinite;
    }

    .star:nth-child(odd) {
      animation-duration: 4.6s;
    }

    .star:nth-child(3n) {
      animation-duration: 5.4s;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    .hole-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      overflow: hidden;
    }

    .hole {
      width: 120vmax;
      height: 120vmax;
      border-radius: 50%;
      background:
        radial-gradient(circle,
          rgba(255,255,255,0.04) 0 2%,
          rgba(201,166,255,0.08) 3%,
          rgba(137,227,255,0.06) 6%,
          rgba(255,255,255,0.02) 9%,
          rgba(0,0,0,0.0) 10%,
          rgba(0,0,0,0.18) 16%,
          rgba(0,0,0,0.0) 19%,
          rgba(201,166,255,0.05) 24%,
          rgba(0,0,0,0.18) 30%,
          rgba(0,0,0,0.0) 36%,
          rgba(137,227,255,0.03) 42%,
          rgba(0,0,0,0.28) 52%,
          rgba(0,0,0,0.5) 64%,
          rgba(0,0,0,0.82) 78%,
          rgba(0,0,0,0.95) 100%);
      opacity: 0.22;
      transform: scale(0.55);
      animation: vortex 20s linear infinite;
      filter: blur(1px);
    }

    @keyframes vortex {
      0% {
        transform: scale(0.55) rotate(0deg);
      }
      50% {
        transform: scale(0.62) rotate(180deg);
      }
      100% {
        transform: scale(0.55) rotate(360deg);
      }
    }

    .floating {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .item {
      position: absolute;
      top: -10vh;
      font-size: 18px;
      opacity: 0.15;
      animation: fall linear infinite;
      filter: blur(0.2px);
    }

    .item:nth-child(1)  { left: 8%;  animation-duration: 18s; animation-delay: -2s; }
    .item:nth-child(2)  { left: 18%; animation-duration: 24s; animation-delay: -8s; }
    .item:nth-child(3)  { left: 27%; animation-duration: 20s; animation-delay: -4s; }
    .item:nth-child(4)  { left: 39%; animation-duration: 28s; animation-delay: -10s; }
    .item:nth-child(5)  { left: 52%; animation-duration: 22s; animation-delay: -6s; }
    .item:nth-child(6)  { left: 66%; animation-duration: 26s; animation-delay: -13s; }
    .item:nth-child(7)  { left: 77%; animation-duration: 19s; animation-delay: -5s; }
    .item:nth-child(8)  { left: 88%; animation-duration: 25s; animation-delay: -11s; }

    @keyframes fall {
      0% {
        transform: translateY(-15vh) rotate(0deg) scale(0.9);
        opacity: 0;
      }
      10% {
        opacity: 0.15;
      }
      100% {
        transform: translateY(115vh) rotate(360deg) scale(1.15);
        opacity: 0;
      }
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 1100px;
      margin: 0 auto;
      padding: 72px 24px 80px;
    }

    .hero {
      text-align: center;
      margin-bottom: 42px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.04em;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(42px, 7vw, 76px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    h1 .gradient {
      background: linear-gradient(135deg, #ffffff, #d9c2ff 35%, #93ecff 75%, #ffffff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      max-width: 720px;
      margin: 0 auto;
      font-size: 18px;
      line-height: 1.6;
      color: var(--muted);
    }

    .quote {
      margin: 18px auto 0;
      max-width: 640px;
      font-size: 14px;
      color: rgba(246, 241, 255, 0.58);
      font-style: italic;
    }

    .trip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 18px;
      margin-top: 42px;
    }

    .trip-card {
      position: relative;
      display: block;
      padding: 22px 20px 20px;
      border-radius: 22px;
      text-decoration: none;
      color: inherit;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.06));
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      overflow: hidden;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .trip-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(137,227,255,0.18), transparent 30%),
        radial-gradient(circle at bottom left, rgba(201,166,255,0.18), transparent 28%);
      opacity: 0.8;
      pointer-events: none;
    }

    .trip-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      border-color: rgba(255,255,255,0.22);
    }

    .trip-card-inner {
      position: relative;
      z-index: 1;
    }

    .country {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .year {
      margin-top: 6px;
      font-size: 14px;
      color: var(--muted);
    }

    .cta {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #fff;
      opacity: 0.85;
    }

    .trip-card:hover .cta {
      opacity: 1;
    }

    .footer {
      margin-top: 48px;
      text-align: center;
      font-size: 13px;
      color: rgba(246, 241, 255, 0.52);
    }

    .footer strong {
      color: rgba(246, 241, 255, 0.74);
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .container {
        padding-top: 56px;
      }

      .subtitle {
        font-size: 16px;
      }

      .trip-card {
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true">
    <div class="star" style="top:8%;left:10%"></div>
    <div class="star" style="top:14%;left:72%"></div>
    <div class="star" style="top:21%;left:84%"></div>
    <div class="star" style="top:30%;left:18%"></div>
    <div class="star" style="top:36%;left:58%"></div>
    <div class="star" style="top:44%;left:8%"></div>
    <div class="star" style="top:52%;left:88%"></div>
    <div class="star" style="top:61%;left:28%"></div>
    <div class="star" style="top:67%;left:76%"></div>
    <div class="star" style="top:75%;left:46%"></div>
    <div class="star" style="top:82%;left:14%"></div>
    <div class="star" style="top:89%;left:68%"></div>
  </div>

  <div class="hole-wrap" aria-hidden="true">
    <div class="hole"></div>
  </div>

  <div class="floating" aria-hidden="true">
    <div class="item">🕰️</div>
    <div class="item">♠</div>
    <div class="item">♥</div>
    <div class="item">♣</div>
    <div class="item">♦</div>
    <div class="item">🎩</div>
    <div class="item">🐇</div>
    <div class="item">🗝️</div>
  </div>

  <main class="container">
    <section class="hero">
      <div class="eyebrow">🐇 HARRY'S RABBIT HOLE</div>
      <p class="subtitle">
        Musings, plans and assorted docs
      </p>
    </section>

    <section class="trip-grid">
      <a class="trip-card" href="japan/2026/">
        <div class="trip-card-inner">
          <div class="country">🇯🇵 Japan</div>
          <div class="year">2026</div>
          <div class="cta">Open map <span>→</span></div>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
